name: Issue Quality Enhancer

on:
  issues:
    types: [opened]

jobs:
  enhance-issue:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read

    steps:
      # ---------------------------------------------------------------
      # 1️⃣ Checkout so we can read docs/agents/triage-labels.md
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 2️⃣ Build the Ollama prompt from the new issue + triage labels
      # ---------------------------------------------------------------
      - name: Build prompt
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          printf '%s' "${ISSUE_BODY:-*(no body provided)*}" > /tmp/issue_body.txt

          {
            cat << 'HEADER'
# Issue Quality Enhancer
Enhance new issues to make them clear, well-structured, and easy to understand.

HEADER

            echo "## Issue to enhance"
            printf '- Number: #%s\n' "$ISSUE_NUMBER"
            printf '- Author: @%s\n' "$ISSUE_AUTHOR"
            printf '- Title:  %s\n' "$ISSUE_TITLE"
            echo "- Body:"
            echo ""
            cat /tmp/issue_body.txt

            echo ""
            echo "## Repository triage labels"
            echo ""
            cat docs/agents/triage-labels.md

            cat << 'TASKS'

## Your tasks

### 1. Improve the title
Add an emoji prefix based on the issue type:
- 🐛 Bug
- ✨ Feature
- 📝 Docs
- 🔧 Refactor
- ⚡ Performance
Example: `🐛 Fix login error when password contains special characters`

### 2. Restructure the body
**For bugs:**
```
## 🐛 Description
## 📋 Steps to Reproduce
## ✅ Expected vs ❌ Actual Behavior
```
**For features:**
```
## ✨ Description
## 🎯 Why is this needed?
## 📐 Proposed Solution
```

### 3. Output format
Respond ONLY with a single valid JSON object — no extra text:
{
  "title": "improved title",
  "body": "improved body (use \\n for newlines)",
  "labels": ["label1"],
  "comment": "one-sentence summary of improvements"
}

Available labels (use 1–3): needs-triage, needs-info, ready-for-agent, ready-for-human, wontfix

## Rules
- Never change the original meaning
- If already well-written, make minimal changes
- Keep it helpful, not verbose
TASKS
          } > /tmp/ollama_prompt.txt

      # ---------------------------------------------------------------
      # 3️⃣ Run Ollama
      # ---------------------------------------------------------------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2

      - name: Pull model
        run: ollama pull tinyllama

      - name: Generate enhancement
        id: ollama
        run: |
          RESPONSE=$(curl -s http://localhost:11434/api/generate \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --rawfile prompt /tmp/ollama_prompt.txt \
                  '{model: "tinyllama", prompt: $prompt, stream: false}')" \
            | jq -r '.response // ""')

          echo "$RESPONSE" > /tmp/ollama_response.txt

          if [ -z "$RESPONSE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ---------------------------------------------------------------
      # 4️⃣ Parse the JSON response and apply changes via gh CLI
      # ---------------------------------------------------------------
      - name: Apply changes
        if: steps.ollama.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          # Robustly extract the first valid JSON object that contains "title"
          JSON=$(python3 - <<'PYEOF'
import sys, json, re

with open('/tmp/ollama_response.txt') as f:
    text = f.read()

for match in re.finditer(r'\{', text):
    start = match.start()
    depth = 0
    for i, ch in enumerate(text[start:], start):
        if ch == '{':
            depth += 1
        elif ch == '}':
            depth -= 1
            if depth == 0:
                candidate = text[start:i+1]
                try:
                    obj = json.loads(candidate)
                    if 'title' in obj:
                        print(json.dumps(obj))
                        sys.exit(0)
                except json.JSONDecodeError:
                    pass
                break

print('{}')
PYEOF
)

          TITLE=$(echo "$JSON" | jq -r '.title // empty')
          BODY=$(echo "$JSON"  | jq -r '.body  // empty')
          COMMENT=$(echo "$JSON" | jq -r '.comment // "Issue reviewed and structured by AI."')

          # Update title + body only when the model returned something meaningful
          if [ -n "$TITLE" ] && [ -n "$BODY" ]; then
            gh issue edit "$ISSUE_NUMBER" \
              --repo "$REPO" \
              --title "$TITLE" \
              --body  "$BODY"
            echo "Updated issue #$ISSUE_NUMBER title and body."
          else
            echo "Model did not return a valid title/body — skipping edit."
          fi

          # Apply labels (silently skip any label that does not exist in the repo)
          echo "$JSON" | jq -r '.labels[]? // empty' | while IFS= read -r label; do
            gh issue edit "$ISSUE_NUMBER" \
              --repo "$REPO" \
              --add-label "$label" 2>/dev/null \
              || echo "Label '$label' not found in repo, skipping."
          done

          # Post a comment summarising what was done
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "$(printf '🤖 **Issue enhanced by AI**\n\n%s\n\n---\n*Processed by [Issue Quality Enhancer](.github/workflows/auto-doc.yml) · model: tinyllama*' "$COMMENT")"
