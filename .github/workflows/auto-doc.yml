name: AI‑Generated Documentation for PRs

on:
  pull_request:
    types: [opened, synchronize]

# ======================================================================
#  JOB: generate a markdown file with Ollama and open a PR with it
# ======================================================================
jobs:
  doc-gen:
    # Use the default GitHub‑hosted runner (Ubuntu) – 7 GB RAM is enough for tiny models.
    runs-on: ubuntu-latest

    # Give the job permission to push a branch and open a PR.
    permissions:
      contents: write          # needed to push the new docs
      pull-requests: write    # needed to create the PR

    steps:
      # ---------------------------------------------------------------
      # 1️⃣ Checkout the repository (needed for diff & for writing files)
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # fetch full history so we can diff against base

      # ---------------------------------------------------------------
      # 2️⃣ Compute a *clean* diff of the PR (excluding vendored files)
      # ---------------------------------------------------------------
      - name: Capture PR diff
        id: prdiff
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin “+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}”

          # Truncate to 8 000 chars – tinyllama has a ~2k token context anyway
          # Three-dot diff = changes since the fork point (equivalent to merge-base diff)
          git diff “origin/${BASE_REF}...HEAD” -- \
            ':(exclude)**/node_modules' \
            ':(exclude)**/.git*' \
            ':(exclude)**/.github' \
            ':(exclude)**/dist' \
            ':(exclude)**/build' \
            | head -c 8000 > /tmp/pr_diff.txt

          # Write prompt to a file – use a group redirect to avoid printf line-continuation issues
          {
            echo 'You are an assistant that writes project documentation for a PR.'
            echo 'Summarise the changes in concise Markdown for a changelog or release notes.'
            echo 'Use headings, bullet-points, and a short Why paragraph if the purpose is clear.'
            echo ''
            printf 'PR title: %s\n' “$PR_TITLE”
            printf 'PR number: #%s\n' “$PR_NUMBER”
            echo ''
            echo 'Diff:'
            cat /tmp/pr_diff.txt
          } > /tmp/ollama_prompt.txt

      # ---------------------------------------------------------------
      # 3️⃣ Start Ollama, pull the model, generate docs via REST API
      # ---------------------------------------------------------------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2

      - name: Pull model
        run: ollama pull tinyllama

      - name: Generate documentation with Ollama
        id: ollama
        run: |
          RESPONSE=$(curl -s http://localhost:11434/api/generate \
            -H 'Content-Type: application/json' \
            -d “$(jq -n --rawfile prompt /tmp/ollama_prompt.txt \
                  --arg model tinyllama \
                  '{model: $model, prompt: $prompt, stream: false}')” \
            | jq -r '.response')

          # Write to file to safely pass between steps
          echo “$RESPONSE” > /tmp/ollama_response.txt
          echo “response_file=/tmp/ollama_response.txt” >> $GITHUB_OUTPUT

      # ---------------------------------------------------------------
      # 4️⃣ Write the LLM output to a file inside the repo
      # ---------------------------------------------------------------
      - name: Save generated markdown
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          DOC_PATH="docs/auto-generated/pr-${PR_NUMBER}.md"
          mkdir -p "$(dirname "$DOC_PATH")"
          cp /tmp/ollama_response.txt "$DOC_PATH"
          echo "Generated markdown written to $DOC_PATH"

      # ---------------------------------------------------------------
      # 5️⃣ Commit the new file and open a PR (requires the create‑pull‑request action)
      # ---------------------------------------------------------------
      - name: Open documentation PR
        uses: peter-evans/create-pull-request@v6
        with:
          # Branch that will be created from the current HEAD
          branch: ai-docs/pr-${{ github.event.pull_request.number }}
          # Same commit message for the doc file
          commit-message: "🤖 Auto‑generated docs for PR #${{ github.event.pull_request.number }}"
          title: "docs: auto‑generated documentation for PR #${{ github.event.pull_request.number }}"
          body: |
            This documentation was generated automatically by Ollama on the PR diff.
            Review it, edit if needed, then merge.

            **Generated by:** `ai-action/ollama-action` (model: `tinyllama`)

          # Optional: label the bot‑generated PR
          labels: autogenerated, documentation
          # Prevent loops – only run when the PR is not created by a bot
          delete-branch: true
